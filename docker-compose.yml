services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vinfast-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./backend/data:/app/data
      - ./storage:/app/storage
    networks:
      - vinfast-net

  nginx:
    image: nginx:alpine
    container_name: vinfast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./storage:/usr/share/nginx/html/storage
      - ./nginx/nginx-http-only.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - vinfast-net

  certbot:
    image: certbot/certbot
    container_name: vinfast-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - vinfast-net

networks:
  vinfast-net:
    driver: bridge
