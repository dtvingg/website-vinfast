server {
    listen 80;
    server_name vinfastmanhhien.click www.vinfastmanhhien.click;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS
    location / {
        return 301 https://vinfastmanhhien.click$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vinfastmanhhien.click www.vinfastmanhhien.click;

    ssl_certificate     /etc/letsencrypt/live/vinfastmanhhien.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vinfastmanhhien.click/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /storage/ {
        alias   /usr/share/nginx/html/storage/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Redirect www → non-www
    if ($host = www.vinfastmanhhien.click) {
        return 301 https://vinfastmanhhien.click$request_uri;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
